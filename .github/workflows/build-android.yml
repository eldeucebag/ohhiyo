name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython requests appdirs packaging toml
          pip install git+https://github.com/kivy/buildozer.git

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            git \
            libffi-dev \
            libssl-dev \
            libtinfo-dev \
            libncurses5-dev \
            libncursesw5-dev \
            openjdk-17-jdk \
            pkg-config \
            python3-dev \
            python3-pip \
            scons \
            unzip \
            wget \
            zlib1g-dev \
            librust-openssl-dev

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          yes | sdkmanager --licenses

      - name: Set Android environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/tools:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_ENV

      - name: Symlink SDK for Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_NDK_HOME ~/.buildozer/android/platform/android-ndk-r25.2.9519653

      - name: Build APK with Buildozer
        run: |
          export SKIP_JDK_VERSION_CHECK=true
          buildozer android debug 2>&1 | tee buildozer.log
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: retibrowser-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: buildozer-log
          path: buildozer.log
          if-no-files-found: ignore
