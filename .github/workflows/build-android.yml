name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0-alpha)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 7.6
        run: |
          mkdir -p $HOME/.gradle/wrapper/dists/gradle-7.6-bin
          cd $HOME/.gradle/wrapper/dists/gradle-7.6-bin
          curl -L https://services.gradle.org/distributions/gradle-7.6-bin.zip -o gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          echo "$HOME/.gradle/wrapper/dists/gradle-7.6-bin/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Build APK with Chaquo
        run: |
          cd /home/runner/work/ohhiyo/ohhiyo
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohhiyo-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
